<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div layout:fragment="content">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${books}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.title}"></td>
            <td th:text="${b.author}"></td>
            <td th:if="${b.price >= 300000}" style="color: yellow">
                <span th:text="${b.price}"></span>
            </td>
            <td th:if="${b.price < 300000}">
                <span th:text="${b.price}"></span>
            </td>
            <td>
                <a th:href="@{/books/{id}(id=${b.id})}">Chi tiết</a>
            </td>
        </tr>
        </tbody>

    </table>
</div>
</body>
</html>
