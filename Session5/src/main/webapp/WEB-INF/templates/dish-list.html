<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách món ăn</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-3">Danh sách món ăn - Bài 3</h2>

    <div class="alert alert-danger" role="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="alert alert-success" role="alert" th:if="${successMessage}" th:text="${successMessage}"></div>

    <table class="table table-bordered">
        <thead class="thead-light">
        <tr>
            <th>ID</th>
            <th>Tên món</th>
            <th>Giá (VND)</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="dish : ${dishes}">
            <td th:text="${dish.id}"></td>
            <td th:text="${dish.name}"></td>
            <td th:text="${dish.price}"></td>
            <td>
                <a class="btn btn-sm btn-primary"
                   th:href="@{|/bai3/edit/${dish.id}|}">Chỉnh sửa</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
