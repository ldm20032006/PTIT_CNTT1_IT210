<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chỉnh sửa món ăn</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-3">Chỉnh sửa món ăn</h2>

    <form method="post"
          th:object="${dish}"
          th:action="@{|/bai3/edit/${dish.id}|}">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="name">Tên món</label>
            <input id="name" class="form-control" type="text" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label for="price">Giá</label>
            <input id="price" class="form-control" type="number" min="0" step="1000" th:field="*{price}" required>
        </div>

        <button class="btn btn-success" type="submit">Lưu thay đổi</button>
        <a class="btn btn-secondary" th:href="@{/bai3}">Quay lại danh sách</a>
    </form>
</div>
</body>
</html>
