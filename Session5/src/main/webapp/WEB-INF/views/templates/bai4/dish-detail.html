<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/layout/main-layout}">
<head>
    <title>Chi tiet mon an</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">Chi tiet mon an</h2>

    <div class="card">
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${dish.id}"></span></p>
            <p><strong>Ten mon:</strong> <span th:text="${dish.name}"></span></p>
            <p><strong>Gia:</strong> <span th:text="${dish.price}"></span></p>
            <p><strong>Mo ta:</strong> <span th:text="${dish.description}"></span></p>
        </div>
    </div>

    <a class="btn btn-secondary mt-3" th:href="@{/bai4}">Quay lai danh sach</a>
</section>
</body>
</html>
