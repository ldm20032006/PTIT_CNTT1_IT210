<!doctype html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{templates/layout/main-layout}">
<head>
    <title>Danh sach mon an</title>
</head>
<body>
<section layout:fragment="content">
    <h2 class="mb-3">Danh sach mon an</h2>

    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <table class="table table-bordered">
        <thead class="thead-light">
        <tr>
            <th>ID</th>
            <th>Ten mon</th>
            <th>Gia</th>
            <th>Tac vu</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="dish : ${dishes}">
            <td th:text="${dish.id}"></td>
            <td th:text="${dish.name}"></td>
            <td th:text="${dish.price}"></td>
            <td>
                <a class="btn btn-sm btn-info" th:href="@{|/bai4/detail/${dish.id}|}">Chi tiet</a>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
